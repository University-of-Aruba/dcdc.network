<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DCDC Network — Dutch Caribbean Digital Competence Consortium</title>
<style>
  html, body { margin:0; padding:0; background:#04060b; font-family: -apple-system, system-ui, "Segoe UI", sans-serif; color:#cfd8e3; overflow:hidden; }
  .wrap { width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; }
  svg { width:100%; height:100%; max-width:1600px; max-height:100vh; }

  .bg { fill: url(#bggrad); }

  .title { font-size:18px; font-weight:600; letter-spacing:1.2px; fill:#e8eef5; text-transform:uppercase; }
  .subtitle { font-size:11px; letter-spacing:1px; fill:#6e7a8a; text-transform:uppercase; }
  .region-label { font-size:10px; letter-spacing:1.6px; fill:#6e7a8a; text-transform:uppercase; }
  .dist-label { font-size:10px; letter-spacing:1px; fill:#8a95a5; text-transform:uppercase; }
  .island-label { font-size:13px; font-weight:500; fill:#e8eef5; }
  .island-sub { font-size:9px; letter-spacing:1px; fill:#8a95a5; text-transform:uppercase; }
  .legend-label { font-size:11px; fill:#cfd8e3; }
  .legend-head { font-size:10px; letter-spacing:1.5px; fill:#6e7a8a; text-transform:uppercase; }

  .region-box { fill:none; stroke:#1a2332; stroke-width:1; stroke-dasharray:3 4; }
  .break-line { stroke:#2a3444; stroke-width:1; stroke-dasharray:6 4; fill:none; }

  /* arcs */
  .arc { fill:none; stroke-linecap:round; }
  .arc-cas { stroke:#f38439; stroke-width:2.4; opacity:0.95; filter:url(#glowOrange); }
  .arc-bes { stroke:#6e94b8; stroke-width:1.4; opacity:0.75; }
  .arc-nl  { stroke:#749c4c; stroke-width:1.4; opacity:0.8; stroke-dasharray:6 5; filter:url(#glowGreen);
             animation: dash 4s linear infinite; }
  @keyframes dash { to { stroke-dashoffset: -44; } }

  /* nodes */
  .node-core { filter:url(#glowWhite); }
  .node-cas { fill:#f38439; }
  .node-bes { fill:#44759e; }
  .node-nl  { fill:#749c4c; }

  .ring { fill:none; }
  .ring-cas { stroke:#f38439; stroke-width:1.2; opacity:0.55; }
  .ring-bes { stroke:#44759e; stroke-width:1; opacity:0.4; }

  .pulse { transform-origin: center; transform-box: fill-box; animation: pulse 2.6s ease-out infinite; }
  @keyframes pulse {
    0%   { transform: scale(1);   opacity: 0.6; }
    100% { transform: scale(2.4); opacity: 0; }
  }

  .leader { stroke:#3a4556; stroke-width:0.8; fill:none; }

  /* island shapes */
  .island-cas {
    fill: rgba(243,132,57,0.22);
    stroke: #f38439;
    stroke-width: 1.1;
    stroke-linejoin: round;
    filter: url(#islandGlowCAS);
  }
  .island-bes {
    fill: rgba(68,117,158,0.22);
    stroke: #6e94b8;
    stroke-width: 0.9;
    stroke-linejoin: round;
    filter: url(#islandGlowBES);
  }
  .island-nl {
    fill: rgba(116,156,76,0.24);
    stroke: #749c4c;
    stroke-width: 1.0;
    stroke-linejoin: round;
    filter: url(#glowGreen);
  }
</style>
</head>
<body>
<div class="wrap">
<svg viewBox="0 0 1400 900" preserveAspectRatio="xMidYMid meet">

  <defs>
    <radialGradient id="bggrad" cx="50%" cy="55%" r="75%">
      <stop offset="0%"   stop-color="#0a1220"/>
      <stop offset="60%"  stop-color="#05080f"/>
      <stop offset="100%" stop-color="#020308"/>
    </radialGradient>

    <filter id="glowOrange" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowWhite" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- stronger glows for island shapes -->
    <filter id="islandGlowCAS" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="5" result="b1"/>
      <feGaussianBlur stdDeviation="9" in="SourceGraphic" result="b2"/>
      <feColorMatrix in="b2" type="matrix"
        values="1.2 0 0 0 0.1
                0 0.55 0 0 0.05
                0 0 0.25 0 0.02
                0 0 0 0.55 0" result="halo"/>
      <feMerge>
        <feMergeNode in="halo"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="islandGlowBES" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="3.5" result="b1"/>
      <feGaussianBlur stdDeviation="7" in="SourceGraphic" result="b2"/>
      <feColorMatrix in="b2" type="matrix"
        values="0.25 0 0 0 0.0
                0 0.5 0 0 0.05
                0 0 1.1 0 0.15
                0 0 0 0.45 0" result="halo"/>
      <feMerge>
        <feMergeNode in="halo"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect class="bg" x="0" y="0" width="1400" height="900"/>

  <!-- faint latitude hint lines -->
  <g opacity="0.08" stroke="#6e94b8" stroke-width="1" stroke-dasharray="2 6">
    <line x1="0" y1="340" x2="1400" y2="340"/>
    <line x1="0" y1="620" x2="1400" y2="620"/>
  </g>

  <!-- Title -->
  <text class="title" x="50" y="56">DCDC Network</text>
  <text class="subtitle" x="50" y="76">Dutch Caribbean Digital Competence Consortium · six islands &amp; the Kingdom link</text>

  <!-- =================== NETHERLANDS =================== -->
  <g id="nl">
    <!-- Real NL coastline from Natural Earth 10m, including Wadden islands -->
    <g transform="translate(700,125)">
      <path class="island-nl" d="M27.7 -26.2L27.4 -23.8L27.7 -21.2L27.2 -18.8L25.7 -15.5L25.4 -12.1L23.7 -11.8L20.8 -11.7L20.6 -10.8L20.4 -9.7L20.8 -7.8L23.5 -7.1L25.4 -6.1L25.1 -3.6L24.1 -1.2L22.6 0.3L21.0 1.0L20.8 2.5L22.2 3.7L21.5 4.8L19.5 5.5L17.4 6.5L15.4 7.3L13.7 6.3L11.8 5.8L10.9 6.8L10.0 8.3L10.6 10.6L11.9 11.4L12.7 13.9L13.4 15.8L13.3 18.5L11.9 20.5L11.3 22.6L12.4 23.3L10.2 24.8L8.9 25.5L8.7 27.4L10.5 27.2L11.4 28.7L10.8 30.2L10.1 31.7L10.4 32.4L7.5 32.4L6.0 32.2L5.0 30.0L6.9 27.8L7.1 25.7L8.2 23.3L6.6 22.3L4.2 21.7L3.5 20.1L1.7 20.5L-0.8 20.5L-0.9 19.7L-2.4 18.5L-2.8 16.7L-3.9 15.8L-5.2 17.4L-7.1 17.0L-6.6 15.2L-8.9 16.6L-10.9 16.5L-12.2 15.7L-12.8 17.2L-13.4 18.3L-14.8 17.3L-18.2 16.0L-19.6 16.8L-21.4 16.9L-23.1 15.9L-24.8 15.9L-26.2 13.5L-24.7 12.6L-20.1 12.6L-20.1 13.4L-17.5 14.6L-15.8 16.1L-14.1 15.5L-15.6 14.3L-17.4 13.8L-17.8 12.3L-15.4 12.7L-16.8 11.3L-17.3 9.7L-18.2 7.8L-20.1 8.1L-19.0 6.8L-17.3 6.7L-17.7 5.2L-17.4 3.4L-14.3 0.4L-11.0 -4.8L-10.0 -8.2L-8.9 -14.6L-8.1 -17.2L-7.8 -19.5L-6.4 -18.3L-4.3 -18.9L0.1 -21.9L1.8 -23.3L3.0 -26.2L4.6 -27.5L8.4 -29.1L10.2 -30.0L13.2 -30.1L15.5 -30.1L21.0 -31.2L23.5 -28.7L25.2 -27.6L26.1 -26.7L27.7 -26.2Z M-25.4 17.0L-22.7 17.8L-20.8 18.5L-18.6 16.9L-17.2 17.9L-15.2 17.9L-15.9 19.6L-18.4 21.1L-21.1 21.7L-23.6 19.8L-26.2 21.0L-27.7 19.8L-27.6 18.7L-25.4 17.0Z M-17.8 10.5L-17.3 11.6L-19.5 11.7L-20.8 10.5L-22.9 9.5L-19.2 9.2L-17.8 10.5Z"/>
    </g>
    <text class="island-label" x="740" y="120" style="font-size:15px; font-weight:600">Netherlands</text>
    <text class="island-sub"   x="740" y="135">The Kingdom seat</text>
  </g>

  <!-- =================== BREAK LINE =================== -->
  <g id="break">
    <line class="break-line" x1="50" y1="220" x2="620" y2="220"/>
    <!-- zigzag break -->
    <path d="M 620,220 L 640,210 L 660,230 L 680,210 L 700,230 L 720,210 L 740,230 L 760,210 L 780,220"
          stroke="#2a3444" stroke-width="1" fill="none"/>
    <line class="break-line" x1="780" y1="220" x2="1350" y2="220"/>
    <text class="dist-label" x="700" y="205" text-anchor="middle">~ 7,800 km · broken to fit</text>
  </g>

  <!-- =================== KINGDOM LINK ARCS (NL -> each CAS) =================== -->
  <g id="kingdom-arcs">
    <!-- Curacao -->
    <path class="arc arc-nl" d="M 700,133 Q 620,360 398,702"/>
    <!-- Aruba -->
    <path class="arc arc-nl" d="M 700,133 Q 500,380 210,698"/>
    <!-- St. Martin -->
    <path class="arc arc-nl" d="M 700,133 Q 950,240 1180,320"/>
  </g>

  <!-- =================== INTER-CLUSTER LINK (between ABC and SSS) =================== -->
  <g id="inter-cluster">
    <!-- Curacao to St. Martin (CAS-CAS, primary) -->
    <path class="arc arc-cas" d="M 398,700 Q 780,470 1180,320" opacity="0.85"/>
    <!-- Aruba to St. Martin (CAS-CAS, primary) -->
    <path class="arc arc-cas" d="M 210,700 Q 680,500 1180,320" opacity="0.7"/>
    <!-- distance marker -->
    <text class="dist-label" x="700" y="495" text-anchor="middle">~ 880 km</text>
  </g>

  <!-- =================== NORTHERN CLUSTER (SSS) =================== -->
  <g id="north">
    <rect class="region-box" x="1020" y="290" width="320" height="230" rx="4"/>
    <text class="region-label" x="1030" y="310">Northern Caribbean · SSS</text>

    <!-- intra-cluster arcs -->
    <!-- SXM - Saba -->
    <path class="arc arc-bes" d="M 1180,320 Q 1130,365 1090,420"/>
    <!-- SXM - Sint Eustatius -->
    <path class="arc arc-bes" d="M 1180,320 Q 1200,390 1200,450"/>

    <!-- nodes -->
    <!-- St. Martin (CAS) — real coastline, whole island (Dutch + French subunits merged) -->
    <g>
      <g transform="translate(1180,320)">
        <path class="island-cas" d="M24.7 15.8L-2.9 5.1L-11.4 3.6L-11.4 1.6L-14.8 2.2L-20.9 4.4L-22.5 4.7L-26.3 2.5L-27.5 0.1L-26.2 -1.5L-14.1 -1.7L-7.0 -3.5L-2.0 -7.4L-0.1 -14.3L3.2 -16.7L10.8 -19.6L19.1 -21.8L24.7 -21.9L24.6 -12.7L27.4 -0.1L27.5 12.7L24.7 15.8Z M-11.4 3.6L-2.9 5.1L24.7 15.8L19.5 21.9L-7.6 14.7L-13.5 11.7L-16.2 8.1L-11.4 4.7L-11.4 3.6Z"/>
      </g>
      <text class="island-label" x="1180" y="288" text-anchor="middle">St. Martin</text>
      <text class="island-sub"   x="1180" y="356" text-anchor="middle">CAS</text>
    </g>
    <!-- Saba (BES) — real coastline from Natural Earth 10m -->
    <g>
      <g transform="translate(1090,420)">
        <path class="island-bes" d="M-0.8 -14.0L6.0 -10.0L11.4 1.4L6.7 10.9L-0.7 14.0L-11.4 6.1L-9.5 -8.3L-0.8 -14.0Z"/>
      </g>
      <text class="island-label" x="1065" y="418" text-anchor="end">Saba</text>
      <text class="island-sub"   x="1065" y="432" text-anchor="end">BES</text>
      <line class="leader" x1="1079" y1="420" x2="1070" y2="420"/>
    </g>
    <!-- Sint Eustatius (BES) — real coastline from Natural Earth 10m (Quill + Northern Hills) -->
    <g>
      <g transform="translate(1200,452)">
        <path class="island-bes" d="M-12.2 -15.0L-5.9 -11.1L-2.9 -4.4L2.7 -1.9L12.2 4.8L10.4 11.2L5.8 15.0L-4.7 13.5L-11.1 1.5L-12.2 -15.0Z"/>
      </g>
      <text class="island-label" x="1222" y="448">Sint Eustatius</text>
      <text class="island-sub"   x="1222" y="462">BES · "Statia"</text>
      <line class="leader" x1="1214" y1="452" x2="1220" y2="450"/>
    </g>

    <!-- scale hint -->
    <g opacity="0.6">
      <line x1="1040" y1="500" x2="1080" y2="500" stroke="#3a4556" stroke-width="1"/>
      <text class="dist-label" x="1084" y="503" style="font-size:9px">~ 50 km</text>
    </g>
  </g>

  <!-- =================== SOUTHERN CLUSTER (ABC) =================== -->
  <g id="south">
    <rect class="region-box" x="60" y="620" width="600" height="220" rx="4"/>
    <text class="region-label" x="70" y="642">Southern Caribbean · ABC · off Venezuela</text>

    <!-- intra-cluster arcs -->
    <!-- Aruba - Curacao (CAS-CAS) -->
    <path class="arc arc-cas" d="M 210,700 Q 304,685 398,700"/>
    <!-- Curacao - Bonaire (CAS-BES) -->
    <path class="arc arc-bes" d="M 398,700 Q 473,695 540,705"/>
    <!-- Aruba - Bonaire (CAS-BES, longer) -->
    <path class="arc arc-bes" d="M 210,700 Q 375,745 540,705"/>

    <!-- nodes -->
    <!-- Aruba (CAS) — real coastline from Natural Earth 10m -->
    <g>
      <g transform="translate(210,700)">
        <path class="island-cas" d="M-8.7 -17.2L10.6 -2.2L14.3 1.9L17.2 9.1L28.5 23.3L29.6 31.8L26.0 35.0L19.4 35.0L12.5 32.3L7.8 27.6L14.3 27.6L14.3 25.4L3.5 20.1L-18.5 0.6L-25.0 -2.0L-28.2 -4.0L-29.6 -7.2L-28.9 -10.5L-26.0 -16.0L-25.2 -19.2L-26.5 -24.5L-28.7 -29.2L-29.1 -32.8L-25.2 -35.0L-12.0 -19.8L-8.7 -17.2Z"/>
      </g>
      <text class="island-label" x="210" y="657" text-anchor="middle">Aruba</text>
      <text class="island-sub"   x="210" y="758" text-anchor="middle">CAS</text>
    </g>
    <!-- Curaçao (CAS) — real coastline from Natural Earth 10m -->
    <g>
      <g transform="translate(398,700)">
        <path class="island-cas" d="M38.5 26.7L46.3 34.7L47.5 36.8L45.5 38.1L40.9 39.0L35.4 39.4L31.0 39.0L25.2 36.2L13.7 28.3L2.4 24.9L-4.8 20.7L-11.4 15.4L-14.2 10.5L-15.7 5.9L-19.3 4.4L-23.6 4.0L-27.0 2.7L-29.9 -0.8L-36.7 -11.8L-39.3 -13.7L-42.3 -15.3L-44.8 -17.3L-45.9 -20.4L-45.4 -28.4L-45.8 -32.7L-47.5 -36.6L-46.3 -38.6L-45.2 -39.4L-44.1 -39.2L-42.9 -38.1L-33.4 -34.1L-29.4 -31.6L-25.5 -28.1L-23.0 -23.9L-20.7 -13.4L-18.7 -8.9L-10.6 -1.2L-1.2 3.4L26.5 10.2L29.7 12.2L31.0 15.0L31.6 19.6L33.4 22.4L38.5 26.7Z"/>
      </g>
      <text class="island-label" x="398" y="653" text-anchor="middle">Curaçao</text>
      <text class="island-sub"   x="398" y="758" text-anchor="middle">CAS</text>
    </g>
    <!-- Bonaire (BES) — real coastline from Natural Earth 10m (no Klein Bonaire at 10m) -->
    <g>
      <g transform="translate(540,705)">
        <path class="island-bes" d="M18.8 -12.9L20.2 -11.9L22.3 -10.0L23.1 -8.1L20.8 -7.2L18.9 -5.0L20.4 5.9L20.0 10.0L18.3 11.3L14.6 11.5L13.2 12.8L13.3 14.6L15.3 20.0L15.9 22.0L15.5 24.0L14.6 26.7L13.5 29.0L12.4 30.0L10.1 29.7L9.0 28.7L4.7 19.6L3.7 15.8L3.3 12.0L4.2 5.5L4.4 1.3L3.3 -3.0L0.2 -7.7L-3.6 -9.9L-13.4 -11.5L-17.9 -12.8L-21.8 -15.4L-23.1 -18.9L-20.3 -23.0L-21.8 -24.3L-20.9 -26.8L-19.6 -28.8L-17.7 -30.0L-14.8 -30.0L-11.8 -28.3L-7.5 -22.7L-5.7 -21.4L-2.3 -20.6L10.4 -14.5L16.9 -13.5L18.8 -12.9Z"/>
      </g>
      <text class="island-label" x="540" y="666" text-anchor="middle">Bonaire</text>
      <text class="island-sub"   x="540" y="762" text-anchor="middle">BES</text>
    </g>

    <!-- scale hint -->
    <g opacity="0.6">
      <line x1="80" y1="815" x2="170" y2="815" stroke="#3a4556" stroke-width="1"/>
      <text class="dist-label" x="174" y="818" style="font-size:9px">~ 200 km</text>
    </g>
  </g>

  <!-- =================== LEGEND =================== -->
  <g id="legend" transform="translate(1050,730)">
    <rect x="0" y="0" width="290" height="140" rx="4" fill="rgba(10,14,22,0.55)" stroke="#1a2332"/>
    <text class="legend-head" x="14" y="22">Legend</text>

    <circle cx="24" cy="46" r="7" class="node-cas"/>
    <text class="legend-label" x="42" y="50">CAS — Aruba · Curaçao · St. Martin</text>

    <circle cx="24" cy="68" r="5" class="node-bes"/>
    <text class="legend-label" x="42" y="72">BES — Bonaire · Saba · Sint Eustatius</text>

    <circle cx="24" cy="90" r="5" class="node-nl"/>
    <text class="legend-label" x="42" y="94">Netherlands</text>

    <line x1="14" y1="112" x2="36" y2="112" stroke="#f38439" stroke-width="2.4"/>
    <text class="legend-label" x="42" y="116" style="font-size:10px">CAS ↔ CAS (primary)</text>

    <line x1="150" y1="112" x2="172" y2="112" stroke="#6e94b8" stroke-width="1.4"/>
    <text class="legend-label" x="178" y="116" style="font-size:10px">CAS ↔ BES</text>

    <line x1="14" y1="128" x2="36" y2="128" stroke="#749c4c" stroke-width="1.4" stroke-dasharray="4 3"/>
    <text class="legend-label" x="42" y="132" style="font-size:10px">Kingdom link (Netherlands)</text>
  </g>

</svg>
</div>
</body>
</html>
